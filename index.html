<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>arabesque</title>
<style>
  body {
    margin: 0;
    font-family: Georgia, serif;
    background: #fdf6e3;
    color: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }

  #stopwatchBtn, #resetBtn {
    padding: 20px 50px;
    font-size: 1.5rem;
    border-radius: 50px;
    border: 2px solid #000;
    background: transparent;
    color: #000;
    cursor: pointer;
    transition: 0.3s;
    margin: 10px 0;
    position: relative;
  }

  #stopwatchBtn:hover, #resetBtn:hover {
    background: rgba(0,0,0,0.08);
  }

  #stopwatchBtn::before, #stopwatchBtn::after,
  #resetBtn::before, #resetBtn::after {
    content: "✵";
    position: absolute;
    font-size: 1.2rem;
    color: #000;
    top: 50%;
    transform: translateY(-50%);
  }
  #stopwatchBtn::before { left: 10px; }
  #stopwatchBtn::after { right: 10px; }
  #resetBtn::before { left: 10px; }
  #resetBtn::after { right: 10px; }

  #timeDisplay {
    margin: 50px 0;
    font-size: 3rem;
    color: #000;
    font-family: "Lucida Calligraphy", Georgia, serif;
    text-shadow: 0 0 8px rgba(0,0,0,0.15);
    position: relative;
  }

  #timeDisplay::before, #timeDisplay::after {
    content: "❧";
    color: #000;
    font-size: 1.5rem;
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
  }
  #timeDisplay::before { left: -30px; }
  #timeDisplay::after { right: -30px; }
</style>
</head>
<body>

<button id="stopwatchBtn">Start</button>
<button id="resetBtn">Reset</button>
<div id="timeDisplay">00:00:00</div>

<script>
let startTime = null;
let timerInterval = null;
let running = false;

const btn = document.getElementById('stopwatchBtn');
const resetBtn = document.getElementById('resetBtn');
const display = document.getElementById('timeDisplay');

function formatTime(ms) {
  const totalSeconds = Math.floor(ms / 1000);
  const hours = String(Math.floor(totalSeconds / 3600)).padStart(2,'0');
  const minutes = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2,'0');
  const seconds = String(totalSeconds % 60).padStart(2,'0');
  return `${hours}:${minutes}:${seconds}`;
}

function updateDisplay() {
  const now = new Date();
  const elapsed = now - startTime;
  display.textContent = formatTime(elapsed);
}

btn.addEventListener('click', () => {
  if (!running) {
    startTime = new Date();
    timerInterval = setInterval(updateDisplay, 1000);
    btn.textContent = "Stop";
    running = true;
  } else {
    clearInterval(timerInterval);
    updateDisplay();
    btn.textContent = "Start";
    running = false;
  }
});

resetBtn.addEventListener('click', () => {
  clearInterval(timerInterval);
  display.textContent = "00:00:00";
  running = false;
  btn.textContent = "Start";
});
</script>

</body>
</html>
