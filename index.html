<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arabesque Stopwatch</title>
<style>
  body {
    margin: 0;
    font-family: Georgia, serif;
    background: #000;
    color: #fdf6e3; /* ivory */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }

  h1 {
    font-family: "Lucida Calligraphy", Georgia, serif;
    font-size: 2.5rem;
    margin-bottom: 50px;
    color: #fdf6e3;
    text-shadow: 0 0 8px rgba(255,255,255,0.4);
  }

  #stopwatchBtn {
    padding: 20px 50px;
    font-size: 1.5rem;
    border-radius: 50px;
    border: 2px solid #b22222; /* deep red */
    background: transparent;
    color: #fdf6e3;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 0 15px rgba(178,34,34,0.4);
  }

  #stopwatchBtn:hover {
    background: rgba(178,34,34,0.15);
  }

  #timeDisplay {
    margin-top: 50px;
    font-size: 3rem;
    color: #fdf6e3;
    font-family: "Lucida Calligraphy", Georgia, serif;
    text-shadow: 0 0 10px rgba(255,255,255,0.3);
  }
</style>
</head>
<body>

<h1>Arabesque Stopwatch</h1>
<button id="stopwatchBtn">Start</button>
<div id="timeDisplay">00:00:00</div>

<script>
let startTime = null;
let timerInterval = null;
let running = false;

const btn = document.getElementById('stopwatchBtn');
const display = document.getElementById('timeDisplay');

function formatTime(ms) {
  const totalSeconds = Math.floor(ms / 1000);
  const hours = String(Math.floor(totalSeconds / 3600)).padStart(2,'0');
  const minutes = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2,'0');
  const seconds = String(totalSeconds % 60).padStart(2,'0');
  return `${hours}:${minutes}:${seconds}`;
}

function updateDisplay() {
  const now = new Date();
  const elapsed = now - startTime;
  display.textContent = formatTime(elapsed);
}

btn.addEventListener('click', () => {
  if (!running) {
    // Start session
    startTime = new Date();
    timerInterval = setInterval(updateDisplay, 1000);
    btn.textContent = "Stop";
    running = true;
  } else {
    // Stop session
    clearInterval(timerInterval);
    updateDisplay();
    btn.textContent = "Start";
    running = false;
  }
});
</script>

</body>
</html>
